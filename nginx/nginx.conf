events {}

http {
    upstream app {
        server app:3000;
    }

    server {
        listen 80;
        server_name _;
        
        # Enforce SSL/TLS Redirects permanently natively across local reverse-proxy level
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        # Temporary self-signed cryptographic bindings assumed mapped directly at docker-compose local volume
        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        client_max_body_size 10m;

        # Hardened Telemetry Endpoint (Only allows Intranet execution)
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://app;
        }

        # Master Reverse Proxy mapping
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
